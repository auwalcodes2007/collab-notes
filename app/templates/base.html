<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pulse Notes{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0f14;
            --bg-secondary: #13161d;
            --bg-card: #1a1e28;
            --accent: #f0a500;
            --accent-dim: #f0a50020;
            --text-primary: #e8e6e0;
            --text-muted: #6b7280;
            --border: #252a36;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }
        .serif { font-family: 'Instrument Serif', serif; }
        .accent { color: var(--accent); }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .btn-primary {
            background: var(--accent);
            color: #0d0f14;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }
        .btn-primary:hover { opacity: 0.85; }
        .input-field {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 8px;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        .input-field:focus { border-color: var(--accent); }
        .input-field::placeholder { color: var(--text-muted); }
        .flash-error {
            background: #2d1515;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .flash-success {
            background: #0f2d1a;
            border: 1px solid #14532d;
            color: #86efac;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.4s ease forwards; }
        .fade-up-delay { animation: fadeUp 0.4s ease 0.1s forwards; opacity: 0; }
        .fade-up-delay-2 { animation: fadeUp 0.4s ease 0.2s forwards; opacity: 0; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
